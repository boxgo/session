# 单元测试 + benchmark（go.work；多 Go 版本矩阵）
name: CI

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Unit tests (Go ${{ matrix.go-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go-version: ["1.19", "1.21", "1.23", "stable"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          cache: true
          cache-dependency-path: |
            go.sum
            store/redis/go.sum

      - name: go test ./...
        run: go test ./... -count=1

  benchmark:
    name: Benchmarks (Go ${{ matrix.go-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go-version: ["1.19", "1.21", "1.23", "stable"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          cache: true
          cache-dependency-path: |
            go.sum
            store/redis/go.sum

      - name: go test -bench
        run: go test ./... -run='^$' -bench=. -benchmem -count=1 -benchtime=200ms
